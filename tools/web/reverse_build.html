<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="将 Whalgebra 单文件应用拆分为模块化源码">
    <title>逆向构建 | Whalgebra</title>
    <link rel="icon" href="../../assets/images/icons/logo.png">
    <link rel="stylesheet" href="../../assets/ui/styles/shared.css">
    <link rel="stylesheet" href="../../assets/ui/styles/test-console.css">
    <link rel="stylesheet" href="../../assets/ui/styles/tool-page.css">
    <script src="../../assets/ui/scripts/shared.js" defer></script>
    <script src="../../assets/ui/scripts/tool_form.js" defer></script>
</head>
<body class="test-page tool-page">
<div class="ambient-background" aria-hidden="true">
    <span class="ambient-blob"></span><span class="ambient-blob"></span>
    <span class="ambient-blob"></span><span class="ambient-blob"></span>
</div>

<header class="test-header glass-panel">
    <div class="test-heading">
        <h1 class="test-title">Whalgebra 逆向构建</h1>
        <span class="test-version">Core v1.0</span>
    </div>
    <div class="test-header-actions">
        <div class="status-pill" data-tool-status data-state="loading" role="status">
            <span class="status-dot" aria-hidden="true"></span>
            <span data-status-text>正在检查服务……</span>
        </div>
        <a class="button button--secondary button--small" href="../../index.html">返回工作台</a>
    </div>
</header>

<main class="test-layout tool-layout">
    <aside class="control-panel glass-panel" aria-label="逆向构建操作">
        <form class="tool-form" data-tool-form data-endpoint="/api/tools/reverse-build" data-confirm-overwrite>
            <section class="control-group">
                <h2 class="section-title">路径设置</h2>
                <div class="field">
                    <label for="reverse-input">输入 HTML</label>
                    <input id="reverse-input" name="inputFile" type="text" value="dist/Whalgebra.html" required>
                </div>
                <div class="field">
                    <label for="reverse-output">输出目录</label>
                    <input id="reverse-output" name="outputDir" type="text" value="src" required>
                </div>
            </section>
            <section class="control-group">
                <h2 class="section-title">构建选项</h2>
                <div class="form-options">
                    <label class="check-option"><input name="noDedent" type="checkbox">保留原始缩进</label>
                    <label class="check-option"><input name="force" type="checkbox" checked>覆盖已有目录</label>
                </div>
            </section>
            <section class="control-group">
                <h2 class="section-title">全局操作</h2>
                <button class="button button--primary test-button" type="submit">执行逆向构建</button>
            </section>
        </form>
    </aside>

    <section class="console-panel" aria-label="逆向构建日志">
        <header class="console-header">
            <span class="console-title">BUILD OUTPUT</span>
        </header>
        <pre class="tool-log" data-tool-log aria-live="polite">等待执行。</pre>
    </section>
</main>
</body>
</html>
