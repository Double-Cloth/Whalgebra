<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Whalgebra 计算核心测试控制台">
    <title>测试控制台 | Whalgebra</title>
    <link rel="icon" href="../../assets/images/icons/logo.png">
    <link rel="stylesheet" href="../../assets/ui/styles/shared.css">
    <link rel="stylesheet" href="../../assets/ui/styles/test-console.css">
    <script src="../../assets/ui/scripts/shared.js" defer></script>
    <script src="../../assets/ui/scripts/json_tree.js" defer></script>
    <script src="../../assets/ui/scripts/log_console.js" defer></script>
    <script src="../browser/test_logic.js" defer></script>
    <script src="../../assets/ui/scripts/test_console.js" defer></script>
</head>
<body class="test-page">
<div class="ambient-background" aria-hidden="true">
    <span class="ambient-blob"></span><span class="ambient-blob"></span>
    <span class="ambient-blob"></span><span class="ambient-blob"></span>
</div>

<header class="test-header glass-panel">
    <div class="test-heading">
        <h1 class="test-title">Whalgebra 测试控制台</h1>
        <span class="test-version">Core v4.1</span>
    </div>
    <div class="test-header-actions">
        <div class="status-pill" data-engine-status data-state="loading" role="status">
            <span class="status-dot" aria-hidden="true"></span>
            <span data-status-text>正在等待计算核心……</span>
        </div>
        <a class="button button--secondary button--small" href="../../index.html">返回工作台</a>
    </div>
</header>

<main class="test-layout">
    <aside class="control-panel glass-panel" aria-label="测试操作">
        <section class="control-group">
            <h2 class="section-title">全局操作</h2>
            <button class="button button--primary test-button" type="button" data-test-mode="0" disabled>
                运行全部测试集
            </button>
            <button class="button button--secondary test-button test-button--danger" type="button" data-action="cancel"
                    disabled hidden>
                取消当前测试
            </button>
            <button class="button button--secondary test-button" type="button" data-action="clear">清空控制台</button>
        </section>
        <section class="control-group">
            <h2 class="section-title">单元测试用例</h2>
            <button class="button button--secondary test-button" type="button" data-test-mode="1" disabled>1. 性能测试
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="2" disabled>2. 幂函数分析
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="3" disabled>3. 统计计算
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="4" disabled>4. 根式函数
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="5" disabled>5. 函数值列表
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="6" disabled>6. 表达式解析
            </button>
            <button class="button button--secondary test-button" type="button" data-test-mode="7" disabled>7. 表达式错误分支
            </button>
        </section>
    </aside>

    <section class="console-panel" aria-label="测试日志">
        <header class="console-header">
            <span class="console-title">DEBUG CONSOLE</span>
            <div class="run-status" data-run-status role="status" aria-live="polite" hidden>
                <span class="run-spinner" aria-hidden="true"></span>
                <span data-run-status-text>等待测试任务</span>
            </div>
            <button class="button button--small console-button" type="button" data-action="auto-scroll"
                    data-enabled="true">自动滚动：开
            </button>
        </header>
        <div id="output" role="log" aria-live="polite"></div>
    </section>
</main>

<iframe class="logic-engine" id="logicEngine" src="../../dist/Whalgebra.html" title="Whalgebra 计算核心"></iframe>
</body>
</html>
